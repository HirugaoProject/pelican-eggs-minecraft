scripts:
  installation:
    script: |-
      #!/bin/ash
      # shellcheck shell=dash
      # Folia Installation Script
      #
      # Server Files: /mnt/server
      : "${SERVER_DIR:=/mnt/server}"
      : "${SERVER_JARFILE:=server.jar}"
      : "${PROJECT:=}"

      if [ -z ${USER_AGENT} ]; then
          echo "The \"USER_AGENT\" variable needs to be set"
          exit 1
      fi

      if [ -z ${PROJECT} ]; then
          echo "The \"PROJECT\" variable needs to be set"
          exit 1
      fi

      if [ ! -d "${SERVER_DIR}" ]; then
          mkdir -p /mnt/server || echo "Cannot create server dir"
      fi

      cd /mnt/server || echo "can't change to /mnt/server"

      if [ -n "${DL_PATH}" ]; then
      	echo "Using supplied download url: ${DL_PATH}"
      	DOWNLOAD_URL=$(eval echo "$(echo "${DL_PATH}" | sed 's/{{/${/g' 's/}}/}/g')")
      else
      	VER_EXISTS=$(curl -A "${USER_AGENT}" -s https://api.papermc.io/v2/projects/${PROJECT} | jq -r --arg VERSION $MINECRAFT_VERSION '.versions[] | contains($VERSION)' | grep -m1 true)
      	LATEST_VERSION=$(curl -A "${USER_AGENT}" -s https://api.papermc.io/v2/projects/${PROJECT} | jq -r '.versions' | jq -r '.[-1]')

      	if [ "${VER_EXISTS}" = "true" ]; then
      		echo "Version is valid. Using version ${MINECRAFT_VERSION}"
      	else
      		echo "Specified version not found. Defaulting to the latest ${PROJECT} version"
      		MINECRAFT_VERSION=${LATEST_VERSION}
      	fi

      	BUILD_EXISTS=$(curl -A "${USER_AGENT}" -s https://api.papermc.io/v2/projects/${PROJECT}/versions/${MINECRAFT_VERSION} | jq -r --arg BUILD ${BUILD_NUMBER} '.builds[] | tostring | contains($BUILD)' | grep -m1 true)
      	LATEST_BUILD=$(curl -A "${USER_AGENT}" -s https://api.papermc.io/v2/projects/${PROJECT}/versions/${MINECRAFT_VERSION} | jq -r '.builds' | jq -r '.[-1]')

      	if [ "${BUILD_EXISTS}" = "true" ]; then
      		echo "Build is valid for version ${MINECRAFT_VERSION}. Using build ${BUILD_NUMBER}"
      	else
      		echo "Using the latest ${PROJECT} build for version ${MINECRAFT_VERSION}"
      		BUILD_NUMBER=${LATEST_BUILD}
      	fi

      	JAR_NAME=${PROJECT}-${MINECRAFT_VERSION}-${BUILD_NUMBER}.jar

      	echo "Version being downloaded"
      	echo "MC Version: ${MINECRAFT_VERSION}"
      	echo "Build: ${BUILD_NUMBER}"
      	echo "JAR Name of Build: ${JAR_NAME}"
      	DOWNLOAD_URL=https://api.papermc.io/v2/projects/${PROJECT}/versions/${MINECRAFT_VERSION}/builds/${BUILD_NUMBER}/downloads/${JAR_NAME}
      fi

      echo "Running curl -A ${USER_AGENT} -o ${SERVER_JARFILE} ${DOWNLOAD_URL}"

      if [ -f "${SERVER_JARFILE}" ]; then
      	mv "${SERVER_JARFILE}" "${SERVER_JARFILE}.old"
      fi

      curl -A "${USER_AGENT}" -o "${SERVER_JARFILE}" "${DOWNLOAD_URL}"

      if [ ! -f server.properties ]; then
          echo "Downloading MC server.properties"
          curl -A "${USER_AGENT}" -o server.properties https://raw.githubusercontent.com/parkervcp/eggs/master/minecraft/java/server.properties
      fi
    container: 'ghcr.io/pelican-eggs/installers:alpine'
    entrypoint: ash
